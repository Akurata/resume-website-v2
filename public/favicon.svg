<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- Dark space background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <!-- Blue accent gradient for the initials -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- Subtle border ring -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#60a5fa" stroke-width="0.75" stroke-opacity="0.35"/>

  <!-- "AK" initials, centered — filter adds a soft glow -->
  <text
    x="16"
    y="22"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="700"
    letter-spacing="-0.5"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >AK</text>
</svg>
